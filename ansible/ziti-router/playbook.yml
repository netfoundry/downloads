- name: Configure a Linux host to run a Docker router
  hosts: ziti_router  # placeholder value
  become: true
  gather_facts: true

  vars:
    ziti_router_image_repo: "quay.io/netfoundry/ziti-router-fips"
    ziti_router_image_tag: "1.7.1"
    ziti_router_network_mode: "bridge"
    ziggy_user: ziggy
    docker_data_device: /dev/sda
    docker_data_partition_number: 4
    docker_data_partition: "{{ docker_data_device }}{{ docker_data_partition_number }}"
    docker_data_mountpoint: /mnt/docker-data
    docker_compose_project_dir: /opt/netfoundry/ziti/ziti-router
    ziti_router_data_dir: "{{ docker_compose_project_dir | dirname }}/ziti-router-data"
    docker_daemon_config_path: /etc/docker/daemon.json
    hardening_script_url: ""
    hardening_script_path: /tmp/setup-ub-2404-local.bash
    docker_packages:
      - docker.io
      - docker-compose-plugin
    base_packages:
      - curl
      - jq
      - net-tools
      - ufw
      - cron
      - ca-certificates
      - logrotate
    services_to_disable:
      - multipathd
      - snapd.service
      - snapd.socket
      - snapd.seeded.service
      - motd-news.service
      - motd-news.timer
      - apport.service
    remove_packages:
      - snapd

    ZITI_CTRL_ADVERTISED_ADDRESS: ""
    ZITI_CTRL_ADVERTISED_PORT: "443"
    ZITI_ROUTER_ADVERTISED_ADDRESS: "{{ ansible_fqdn }}"
    ZITI_ROUTER_PORT: "443"
    ZITI_ROUTER_MODE: "tproxy"
    ZITI_ROUTER_TYPE: "edge"

    router_link_out_queue_size: 4
    router_edge_connect_timeout_ms: 5000
    router_edge_session_timeout_seconds: 60
    router_tunnel_lan_if: enp1s0
    router_tunnel_dns_range: "100.64.0.1/16"
    router_tunnel_dns_upstream: "udp://9.9.9.9"
    router_forwarder:
      latency_probe_interval_seconds: 0
      xgress_dial_queue_length: 1000
      xgress_dial_worker_count: 128
      link_dial_queue_length: 1000
      link_dial_worker_count: 32
    router_edge_csr:
      country: US
      province: NC
      locality: Charlotte
      organization: NetFoundry
      organizational_unit: Ziti
      extra_dns_sans:
        - csbase
        - 252da24cf526
      extra_ip_sans:
        - "127.0.0.1"
        - "::1"

    ziti_router_autostart: false

  pre_tasks:
    - name: Ensure we are running on Ubuntu 24.04
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution'] | lower == 'ubuntu'
          - ansible_facts['distribution_version'].startswith('24.04')
        fail_msg: "This playbook targets Ubuntu 24.04 hosts."

    - name: Ensure the Ziggy user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ ziggy_user }}"
      register: ziggy_passwd

    - name: Derive Ziggy UID and GID facts
      ansible.builtin.set_fact:
        ZIGGY_UID: "{{ ziggy_passwd.ansible_facts.getent_passwd[ziggy_user][2] }}"
        ZIGGY_GID: "{{ ziggy_passwd.ansible_facts.getent_passwd[ziggy_user][3] }}"

    - name: Determine container runtime user
      ansible.builtin.set_fact:
        ziti_container_owner_user: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"

    - name: Lookup container runtime user entry
      ansible.builtin.getent:
        database: passwd
        key: "{{ ziti_container_owner_user }}"
      register: ziti_container_user_entry

    - name: Lookup container runtime primary group
      ansible.builtin.getent:
        database: group
        key: "{{ ziti_container_user_entry.ansible_facts.getent_passwd[ziti_container_owner_user][3] }}"
      register: ziti_container_group_entry

    - name: Set container user identity facts
      ansible.builtin.set_fact:
        ziti_container_uid: "{{ ziti_container_user_entry.ansible_facts.getent_passwd[ziti_container_owner_user][2] }}"
        ziti_container_gid: "{{ ziti_container_user_entry.ansible_facts.getent_passwd[ziti_container_owner_user][3] }}"
        ziti_container_group_name: "{{ (ziti_container_group_entry.ansible_facts.getent_group | dict2items | map(attribute='key') | list)[0] }}"

    - name: Determine container runtime user and capabilities
      ansible.builtin.set_fact:
        ziti_container_cap_add: >-
          {{ ['NET_ADMIN'] if (ZITI_ROUTER_MODE | lower) == 'tproxy' else (['NET_BIND_SERVICE'] if (ZITI_ROUTER_MODE | lower) == 'proxy' else []) }}
        ziti_container_run_user: >-
          {{ '0:0' if (ZITI_ROUTER_MODE | lower) == 'tproxy' else (ZIGGY_UID ~ ':' ~ ZIGGY_GID) }}

    - name: Determine LAN interface fact key
      ansible.builtin.set_fact:
        router_tunnel_lan_fact_key: "ansible_{{ router_tunnel_lan_if }}"

    - name: Capture LAN interface facts
      ansible.builtin.set_fact:
        router_tunnel_lan_iface_facts: "{{ ansible_facts.get(router_tunnel_lan_fact_key, {}) }}"

    - name: Ensure LAN interface has an IPv4 address
      ansible.builtin.assert:
        that:
          - router_tunnel_lan_iface_facts.ipv4 is defined
          - router_tunnel_lan_iface_facts.ipv4.address is defined
          - (router_tunnel_lan_iface_facts.ipv4.address | length) > 0
        fail_msg: "Interface {{ router_tunnel_lan_if }} must have an IPv4 address assigned before deploying the router."

    - name: Set LAN interface IPv4 address fact
      ansible.builtin.set_fact:
        router_tunnel_lan_ipv4: "{{ router_tunnel_lan_iface_facts.ipv4.address }}"

    - name: Configure tunnel resolver from LAN interface
      ansible.builtin.set_fact:
        router_tunnel_resolver: "udp://{{ router_tunnel_lan_ipv4 }}:53"

    - name: Add LAN IPv4 address to CSR IP SAN list
      ansible.builtin.set_fact:
        router_edge_csr: "{{ router_edge_csr | combine({'extra_ip_sans': router_edge_csr.extra_ip_sans | union([router_tunnel_lan_ipv4])}) }}"

    - name: Ensure ZITI_ENROLL_TOKEN is defined
      ansible.builtin.assert:
        that:
          - ZITI_ENROLL_TOKEN is defined
          - (ZITI_ENROLL_TOKEN | length) > 0
        fail_msg: "Provide the ZITI_ENROLL_TOKEN via --extra-vars or inventory."
      no_log: true

  tasks:
    - name: Update apt cache and upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist

    - name: Install base packages
      ansible.builtin.apt:
        name: "{{ base_packages + docker_packages }}"
        state: present

    - name: Allow SSH via UFW
      community.general.ufw:
        rule: allow
        name: OpenSSH

    - name: Rate limit SSH via UFW
      community.general.ufw:
        rule: limit
        name: OpenSSH

    - name: Ensure UFW is enabled
      community.general.ufw:
        state: enabled

    - name: Check if Docker data partition exists
      ansible.builtin.command: "lsblk -no FSTYPE {{ docker_data_partition }}"
      register: docker_partition_check
      failed_when: false
      changed_when: false

    - name: Create Docker data partition when missing
      ansible.builtin.shell: |
        set -euo pipefail
        echo -e "n\np\n{{ docker_data_partition_number }}\n\n\nw\n" | fdisk {{ docker_data_device }}
      when: docker_partition_check.rc != 0

    - name: Wait for partition table refresh
      ansible.builtin.command: partprobe {{ docker_data_device }}
      when: docker_partition_check.rc != 0
      changed_when: false

    - name: Create ext4 filesystem on Docker data partition
      community.general.filesystem:
        dev: "{{ docker_data_partition }}"
        fstype: ext4
      when: docker_partition_check.rc != 0

    - name: Ensure Docker data mount point exists
      ansible.builtin.file:
        path: "{{ docker_data_mountpoint }}"
        state: directory
        mode: "0755"

    - name: Fetch Docker data partition UUID
      ansible.builtin.command: "blkid -s UUID -o value {{ docker_data_partition }}"
      register: docker_data_uuid
      changed_when: false

    - name: Mount Docker data partition and persist in fstab
      ansible.builtin.mount:
        path: "{{ docker_data_mountpoint }}"
        src: "UUID={{ docker_data_uuid.stdout }}"
        fstype: ext4
        opts: defaults
        state: mounted

    - name: Disable unnecessary services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: false
        state: stopped
      loop: "{{ services_to_disable }}"
      ignore_errors: true

    - name: Autoremove unused packages
      ansible.builtin.apt:
        autoremove: true

    - name: Purge unwanted packages
      ansible.builtin.apt:
        name: "{{ remove_packages }}"
        state: absent
        purge: true

    - name: Download host hardening script
      ansible.builtin.get_url:
        url: "{{ hardening_script_url }}"
        dest: "{{ hardening_script_path }}"
        mode: "0700"

    - name: Execute host hardening script
      ansible.builtin.command: "{{ hardening_script_path }}"
      register: hardening_result
      changed_when: hardening_result.rc == 0

    - name: Remove temporary hardening artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - autohost
        - image-build.yml
        - roles

    - name: Ensure Docker data-root directory exists
      ansible.builtin.file:
        path: "{{ docker_data_mountpoint }}/docker"
        state: directory
        mode: "0755"

    - name: Configure Docker daemon data-root
      ansible.builtin.copy:
        dest: "{{ docker_daemon_config_path }}"
        content: |
          {
            "data-root": "{{ docker_data_mountpoint }}/docker"
          }
        owner: root
        group: root
        mode: "0644"

    - name: Restart Docker to apply configuration
      ansible.builtin.systemd:
        name: docker
        state: restarted
        enabled: true

    - name: Ensure compose project directory exists
      ansible.builtin.file:
        path: "{{ docker_compose_project_dir }}"
        state: directory
        owner: "{{ ziti_container_owner_user }}"
        group: "{{ ziti_container_group_name }}"
        mode: "0755"

    - name: Ensure router data directory exists for bind mount
      ansible.builtin.file:
        path: "{{ ziti_router_data_dir }}"
        state: directory
        owner: "{{ ziti_container_owner_user }}"
        group: "{{ ziti_container_group_name }}"
        mode: "0750"

    - name: Deploy Docker Compose project file
      ansible.builtin.template:
        src: templates/docker-compose.yml.j2
        dest: "{{ docker_compose_project_dir }}/docker-compose.yml"
        mode: "0640"
        owner: "{{ ziti_container_owner_user }}"
        group: "{{ ziti_container_group_name }}"
      no_log: true

    - name: Deploy Ziti router configuration file
      ansible.builtin.template:
        src: templates/router-config.yml.j2
        dest: "{{ ziti_router_data_dir }}/config.yml"
        owner: "{{ ziti_container_owner_user }}"
        group: "{{ ziti_container_group_name }}"
        mode: "0600"
      no_log: true

    - name: Start Ziti router container with Docker Compose
      ansible.builtin.command: >-
        docker compose -f {{ docker_compose_project_dir }}/docker-compose.yml up -d
      register: compose_up
      changed_when: "'already exists' not in compose_up.stdout"
      when: ziti_router_autostart
      become: true
      become_user: "{{ ziti_container_owner_user }}"

  handlers: []
